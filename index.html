<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WebGIS 企业与开发区分布</title>

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/ol@v7.3.0/ol.css">
    <script src="https://cdn.jsdelivr.net/npm/ol@v7.3.0/dist/ol.js"></script>
    <script src="https://unpkg.com/gcoord/dist/gcoord.global.prod.js"></script>

    <style>
        /* 页面基础布局 */
        :root {
            color-scheme: light;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body,
        #map {
            width: 100%;
            height: 100%;
            margin: 0;
        }

        body {
            overflow: hidden;
        }

        /* 左侧数据浏览与图层控制面板 */
        .map-panel {
            position: absolute;
            top: 12px;
            left: 12px;
            z-index: 10;
            width: 280px;
            max-height: calc(100vh - 24px);
            padding: 14px;
            overflow: auto;
            color: #1f2937;
            background: rgba(255, 255, 255, 0.94);
            border: 1px solid rgba(148, 163, 184, 0.5);
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(15, 23, 42, 0.18);
            backdrop-filter: blur(6px);
        }

        .map-panel h1 {
            margin: 0;
            font-size: 16px;
            line-height: 1.4;
        }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 12px;
        }

        .panel-toggle {
            display: none;
            flex: 0 0 auto;
            padding: 5px 9px;
            color: #5b21b6;
            font: inherit;
            font-size: 12px;
            cursor: pointer;
            background: #f5f3ff;
            border: 1px solid #c4b5fd;
            border-radius: 5px;
        }

        .layer-option,
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
            font-size: 13px;
        }

        .layer-option {
            cursor: pointer;
        }

        .legend-symbol {
            flex: 0 0 auto;
            width: 14px;
            height: 14px;
        }

        .legend-symbol.polygon {
            background: rgba(168, 85, 247, 0.24);
            border: 2px solid #7c3aed;
        }

        .legend-symbol.point {
            border: 2px solid white;
            border-radius: 50%;
            background: #dc2626;
            box-shadow: 0 0 0 1px #991b1b;
        }

        .panel-divider {
            height: 1px;
            margin: 12px 0 4px;
            background: #e2e8f0;
        }

        .panel-section-title {
            margin: 12px 0 6px;
            color: #475569;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        .search-input {
            width: 100%;
            padding: 8px 10px;
            font: inherit;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            outline: none;
        }

        .search-input:focus {
            border-color: #7c3aed;
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.14);
        }

        .filter-select {
            width: 100%;
            padding: 8px 7px;
            color: #334155;
            font: inherit;
            font-size: 12px;
            background: white;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
        }

        .filter-actions {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }

        .filter-action-button {
            flex: 1;
            padding: 7px;
            color: #5b21b6;
            font: inherit;
            font-size: 12px;
            cursor: pointer;
            background: #f5f3ff;
            border: 1px solid #c4b5fd;
            border-radius: 6px;
        }

        .filter-action-button.primary {
            color: white;
            background: #6d28d9;
            border-color: #6d28d9;
        }

        /* ArcGIS Pro 风格的企业属性查询窗口 */
        .attribute-query {
            position: absolute;
            top: 50%;
            left: 50%;
            z-index: 30;
            width: min(760px, calc(100vw - 32px));
            max-height: calc(100vh - 40px);
            padding: 16px;
            overflow: auto;
            color: #1f2937;
            background: white;
            border: 1px solid #94a3b8;
            border-radius: 8px;
            box-shadow: 0 12px 40px rgba(15, 23, 42, 0.35);
            transform: translate(-50%, -50%);
        }

        .attribute-query[hidden] {
            display: none;
        }

        .attribute-query-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
            cursor: move;
            user-select: none;
            touch-action: none;
        }

        .attribute-query-header h2 {
            margin: 0;
            font-size: 17px;
        }

        .attribute-query.dragging {
            cursor: grabbing;
        }

        .attribute-query-close {
            padding: 2px 8px;
            color: #64748b;
            font-size: 22px;
            cursor: pointer;
            background: transparent;
            border: 0;
        }

        .query-toolbar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            font-size: 13px;
        }

        .query-clause {
            display: grid;
            grid-template-columns: minmax(170px, 1.5fr) minmax(110px, 0.8fr) minmax(150px, 1fr) 34px;
            gap: 7px;
            margin-bottom: 7px;
        }

        .query-clause select,
        .query-clause input {
            min-width: 0;
            padding: 8px;
            font: inherit;
            font-size: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 5px;
        }

        .query-remove {
            color: #991b1b;
            font-size: 18px;
            cursor: pointer;
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 5px;
        }

        .query-result {
            margin-top: 10px;
            padding: 8px 10px;
            color: #334155;
            font-size: 12px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
        }

        .search-results {
            max-height: 210px;
            margin: 6px 0 0;
            padding: 0;
            overflow: auto;
            list-style: none;
        }

        .search-result-button {
            width: 100%;
            padding: 7px 8px;
            color: #334155;
            font: inherit;
            font-size: 12px;
            text-align: left;
            cursor: pointer;
            background: transparent;
            border: 0;
            border-bottom: 1px solid #eef2f7;
        }

        .search-result-button:hover,
        .search-result-button:focus {
            color: #5b21b6;
            background: #f5f3ff;
        }

        .search-empty {
            padding: 8px 2px;
            color: #64748b;
            font-size: 12px;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .summary-card {
            padding: 9px;
            text-align: center;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
        }

        .summary-value {
            display: block;
            color: #5b21b6;
            font-size: 18px;
            font-weight: 700;
        }

        .summary-label {
            color: #64748b;
            font-size: 11px;
        }

        .panel-button {
            width: 100%;
            margin-top: 10px;
            padding: 8px 10px;
            color: white;
            font: inherit;
            font-size: 13px;
            cursor: pointer;
            background: #6d28d9;
            border: 0;
            border-radius: 6px;
        }

        .panel-button:hover {
            background: #5b21b6;
        }

        .panel-button:disabled {
            cursor: not-allowed;
            opacity: 0.55;
        }

        /* 页面底部的数据加载状态提示 */
        .status {
            position: absolute;
            left: 50%;
            bottom: 18px;
            z-index: 10;
            max-width: calc(100% - 32px);
            padding: 8px 14px;
            color: #334155;
            font-size: 13px;
            background: rgba(255, 255, 255, 0.94);
            border-radius: 18px;
            box-shadow: 0 2px 10px rgba(15, 23, 42, 0.18);
            transform: translateX(-50%);
            transition: opacity 0.2s;
        }

        .status.error {
            color: #991b1b;
            background: #fef2f2;
        }

        .status.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* 地图要素属性弹窗 */
        .popup {
            position: relative;
            width: min(360px, calc(100vw - 32px));
            max-height: min(440px, calc(100vh - 64px));
            padding: 14px;
            overflow: auto;
            color: #1f2937;
            font-size: 13px;
            background: white;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            box-shadow: 0 5px 20px rgba(15, 23, 42, 0.28);
        }

        .popup::after {
            position: absolute;
            bottom: -9px;
            left: 20px;
            width: 16px;
            height: 16px;
            content: "";
            background: white;
            border-right: 1px solid #cbd5e1;
            border-bottom: 1px solid #cbd5e1;
            transform: rotate(45deg);
        }

        .popup-title {
            margin: 0 26px 10px 0;
            font-size: 15px;
            cursor: move;
            user-select: none;
            touch-action: none;
        }

        .popup.dragging {
            cursor: grabbing;
        }

        .popup-close {
            position: absolute;
            top: 6px;
            right: 8px;
            width: 28px;
            height: 28px;
            padding: 0;
            color: #64748b;
            font-size: 22px;
            line-height: 26px;
            cursor: pointer;
            background: transparent;
            border: 0;
        }

        .popup table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        .popup th,
        .popup td {
            padding: 6px 7px;
            overflow-wrap: anywhere;
            text-align: left;
            vertical-align: top;
            border: 1px solid #e2e8f0;
        }

        .popup th {
            width: 34%;
            color: #475569;
            font-weight: 600;
            background: #f8fafc;
        }

        /* 手机和平板使用可折叠侧栏，避免遮挡地图 */
        @media (max-width: 900px), (hover: none) and (pointer: coarse) {
            .map-panel {
                top: 8px;
                left: 8px;
                width: min(260px, calc(100vw - 16px));
                max-height: calc(100vh - 16px);
                padding: 10px;
                overflow: hidden;
            }

            .panel-header {
                margin-bottom: 0;
            }

            .map-panel h1 {
                font-size: 14px;
            }

            .panel-toggle {
                display: block;
            }

            .panel-content {
                max-height: 0;
                overflow: hidden;
                opacity: 0;
                transition: max-height 0.25s ease, opacity 0.2s ease, margin-top 0.25s ease;
            }

            .map-panel.expanded .panel-content {
                max-height: calc(100vh - 80px);
                margin-top: 10px;
                overflow-y: auto;
                opacity: 1;
            }

            .status {
                bottom: 12px;
            }

            .query-clause {
                grid-template-columns: 1fr;
            }

            .query-remove {
                height: 34px;
            }
        }
    </style>
</head>
<body>
    <!-- OpenLayers 地图容器 -->
    <main id="map" aria-label="企业与开发区分布地图"></main>

    <!-- 数据统计、搜索、图层控制与图例 -->
    <aside class="map-panel" aria-label="图层控制和图例">
        <div class="panel-header">
            <h1>企业与开发区分布</h1>
            <button
                id="panel-toggle"
                class="panel-toggle"
                type="button"
                aria-expanded="false"
                aria-controls="panel-content">展开</button>
        </div>

        <div id="panel-content" class="panel-content">
            <div class="summary-grid" aria-label="数据统计">
                <div class="summary-card">
                    <strong id="polygon-count" class="summary-value">--</strong>
                    <span class="summary-label">开发区</span>
                </div>
                <div class="summary-card">
                    <strong id="point-count" class="summary-value">--</strong>
                    <span class="summary-label">工业企业</span>
                </div>
            </div>

            <div class="panel-section-title">企业搜索</div>
            <input
                id="company-search"
                class="search-input"
                type="search"
                placeholder="输入企业名称"
                autocomplete="off">

            <ul id="search-results" class="search-results" aria-label="企业搜索结果"></ul>
            <button id="open-attribute-query" class="panel-button" type="button" disabled>
                企业属性搜索
            </button>

            <div class="panel-section-title">开发区搜索</div>
            <input
                id="development-zone-search"
                class="search-input"
                type="search"
                placeholder="输入开发区或区块名称"
                autocomplete="off">
            <ul
                id="development-zone-results"
                class="search-results"
                aria-label="开发区搜索结果"></ul>

            <div class="panel-section-title">底图选择</div>
            <label class="layer-option">
                <input type="radio" name="base-map" value="standard" checked>
                高德标准地图
            </label>
            <label class="layer-option">
                <input type="radio" name="base-map" value="imagery">
                高德影像
            </label>
            <label class="layer-option">
                <input id="imagery-label-toggle" type="checkbox" checked disabled>
                显示影像标注
            </label>

            <div class="panel-section-title">图层控制</div>
            <label class="layer-option">
                <input id="polygon-toggle" type="checkbox" checked>
                开发区图层
            </label>
            <label class="layer-option">
                <input id="point-toggle" type="checkbox" checked>
                工业企业图层
            </label>
            <div class="panel-divider"></div>
            <div class="legend-item">
                <span class="legend-symbol polygon"></span>
                开发区范围
            </div>
            <div class="legend-item">
                <span class="legend-symbol point"></span>
                工业企业 / 聚合数量
            </div>
            <button id="reset-view" class="panel-button" type="button">显示全部数据</button>
        </div>
    </aside>

    <!-- 数据加载和错误状态 -->
    <div id="status" class="status" role="status">正在加载地图数据...</div>

    <!-- 点击要素后显示的可拖动属性弹窗 -->
    <div id="popup" class="popup" hidden>
        <button id="popup-close" class="popup-close" type="button" aria-label="关闭弹窗">&times;</button>
        <h2 id="popup-title" class="popup-title">属性信息</h2>
        <div id="popup-content"></div>
    </div>

    <!-- 企业按属性选择窗口 -->
    <section id="attribute-query" class="attribute-query" aria-label="企业属性搜索" hidden>
        <div class="attribute-query-header">
            <h2>企业属性搜索</h2>
            <button id="close-attribute-query" class="attribute-query-close" type="button"
                aria-label="关闭企业属性搜索">&times;</button>
        </div>
        <div class="query-toolbar">
            <span>条件关系</span>
            <select id="query-match-mode" class="filter-select">
                <option value="all">满足全部条件（AND）</option>
                <option value="any">满足任一条件（OR）</option>
            </select>
        </div>
        <div id="query-clauses"></div>
        <div class="filter-actions">
            <button id="add-query-clause" class="filter-action-button" type="button">添加条件</button>
            <button id="run-attribute-query" class="filter-action-button primary" type="button">
                选择
            </button>
            <button id="zoom-query-result" class="filter-action-button" type="button">
                缩放至选择
            </button>
            <button id="clear-attribute-query" class="filter-action-button" type="button">
                清除选择
            </button>
        </div>
        <div id="attribute-query-result" class="query-result">尚未执行属性查询。</div>
    </section>

    <script>
        // 常用 DOM 元素与弹窗拖动状态
        const statusElement = document.getElementById("status");
        const popupElement = document.getElementById("popup");
        const popupTitle = document.getElementById("popup-title");
        const popupContent = document.getElementById("popup-content");
        const mapPanel = document.querySelector(".map-panel");
        const panelToggle = document.getElementById("panel-toggle");
        const attributeQueryElement = document.getElementById("attribute-query");
        const attributeQueryHeader = attributeQueryElement.querySelector(
            ".attribute-query-header"
        );
        let companyPropertyFields = [];
        const companyFieldTypes = new Map();
        let popupDragState = null;
        let attributeQueryDragState = null;

        // 高德标准地图：国内访问稳定，包含中文道路和地名
        const gaodeStandardLayer = new ol.layer.Tile({
            source: new ol.source.XYZ({
                url: "https://webst0{1-4}.is.autonavi.com/appmaptile"
                    + "?style=7&x={x}&y={y}&z={z}"
            }),
            visible: true
        });

        // 高德影像使用 GCJ-02 坐标，切换时会同步转换业务数据
        const gaodeImageLayer = new ol.layer.Tile({
            source: new ol.source.XYZ({
                url: "https://webst0{1-4}.is.autonavi.com/appmaptile"
                    + "?style=6&x={x}&y={y}&z={z}"
            }),
            visible: false
        });

        // 高德中文道路与地名标注层
        const gaodeLabelLayer = new ol.layer.Tile({
            source: new ol.source.XYZ({
                url: "https://webst0{1-4}.is.autonavi.com/appmaptile"
                    + "?style=8&x={x}&y={y}&z={z}"
            }),
            visible: false
        });

        // 开发区面图层
        const polygonSource = new ol.source.Vector();
        const polygonLayer = new ol.layer.Vector({
            source: polygonSource,
            style: new ol.style.Style({
                stroke: new ol.style.Stroke({
                    color: "#7c3aed",
                    width: 2.5
                }),
                fill: new ol.style.Fill({
                    color: "rgba(168, 85, 247, 0.24)"
                })
            })
        });

        // 企业点聚合图层：缩放较小时合并临近企业点
        const pointSource = new ol.source.Vector();
        const clusterSource = new ol.source.Cluster({
            distance: 36,
            minDistance: 12,
            source: pointSource
        });
        const clusterStyleCache = {};

        const pointLayer = new ol.layer.Vector({
            source: clusterSource,
            style(feature) {
                const clusteredFeatures = feature.get("features");
                const size = clusteredFeatures ? clusteredFeatures.length : 1;
                if (!clusterStyleCache[size]) {
                    const radius = size === 1 ? 7 : Math.min(10 + Math.log(size) * 3, 22);
                    clusterStyleCache[size] = new ol.style.Style({
                        image: new ol.style.Circle({
                            radius,
                            fill: new ol.style.Fill({
                                color: size === 1 ? "#dc2626" : "#b91c1c"
                            }),
                            stroke: new ol.style.Stroke({
                                color: "#ffffff",
                                width: 2
                            })
                        }),
                        text: size > 1 ? new ol.style.Text({
                            text: String(size),
                            fill: new ol.style.Fill({
                                color: "#ffffff"
                            }),
                            font: "600 12px sans-serif"
                        }) : undefined
                    });
                }
                return clusterStyleCache[size];
            }
        });

        // 选中高亮图层：仅用于展示，不参与地图点击命中
        const selectionSource = new ol.source.Vector();
        const selectionLayer = new ol.layer.Vector({
            source: selectionSource,
            style(feature) {
                if (feature.getGeometry().getType() === "Point") {
                    return [
                        new ol.style.Style({
                            image: new ol.style.Circle({
                                radius: 15,
                                fill: new ol.style.Fill({
                                    color: "rgba(250, 204, 21, 0.28)"
                                }),
                                stroke: new ol.style.Stroke({
                                    color: "#facc15",
                                    width: 4
                                })
                            })
                        }),
                        new ol.style.Style({
                            image: new ol.style.Circle({
                                radius: 7,
                                fill: new ol.style.Fill({
                                    color: "#dc2626"
                                }),
                                stroke: new ol.style.Stroke({
                                    color: "#ffffff",
                                    width: 2
                                })
                            })
                        })
                    ];
                }

                return new ol.style.Style({
                    stroke: new ol.style.Stroke({
                        color: "#facc15",
                        width: 5
                    }),
                    fill: new ol.style.Fill({
                        color: "rgba(250, 204, 21, 0.25)"
                    })
                });
            }
        });

        // 企业属性查询结果批量高亮层
        const attributeSelectionSource = new ol.source.Vector();
        const attributeSelectionLayer = new ol.layer.Vector({
            source: attributeSelectionSource,
            style: new ol.style.Style({
                image: new ol.style.Circle({
                    radius: 10,
                    fill: new ol.style.Fill({
                        color: "rgba(6, 182, 212, 0.28)"
                    }),
                    stroke: new ol.style.Stroke({
                        color: "#06b6d4",
                        width: 3
                    })
                })
            })
        });

        // 属性弹窗使用 Overlay 与地图坐标保持关联
        const popupOverlay = new ol.Overlay({
            element: popupElement,
            autoPan: {
                animation: {
                    duration: 250
                }
            },
            offset: [-20, -12],
            positioning: "bottom-left"
        });

        // 初始化地图并按顺序叠加业务图层
        const map = new ol.Map({
            target: "map",
            layers: [
                gaodeStandardLayer,
                gaodeImageLayer,
                gaodeLabelLayer,
                polygonLayer,
                pointLayer,
                attributeSelectionLayer,
                selectionLayer
            ],
            overlays: [popupOverlay],
            view: new ol.View({
                center: ol.proj.fromLonLat([120.15, 30.28]),
                zoom: 10,
                minZoom: 5,
                maxZoom: 19
            })
        });

        // 12 级以上直接显示原始企业点，不再使用聚合源
        function updatePointAggregation() {
            const shouldCluster = map.getView().getZoom() <= 12;
            const targetSource = shouldCluster ? clusterSource : pointSource;
            if (pointLayer.getSource() !== targetSource) {
                pointLayer.setSource(targetSource);
            }
        }

        map.getView().on("change:resolution", updatePointAggregation);
        updatePointAggregation();

        // 状态提示与选中高亮管理
        function updateStatus(message, isError = false) {
            statusElement.textContent = message;
            statusElement.classList.toggle("error", isError);
            statusElement.classList.remove("hidden");
        }

        function hideStatus() {
            statusElement.classList.add("hidden");
        }

        function closePopup() {
            popupOverlay.setPosition(undefined);
            popupElement.hidden = true;
            selectionSource.clear();
        }

        function highlightFeature(feature) {
            selectionSource.clear();
            selectionSource.addFeature(feature.clone());
        }

        // 通过标题栏拖动属性弹窗
        function startPopupDrag(event) {
            const position = popupOverlay.getPosition();
            if (!position || event.button !== 0) {
                return;
            }

            popupDragState = {
                pointerId: event.pointerId,
                startClientX: event.clientX,
                startClientY: event.clientY,
                startPixel: map.getPixelFromCoordinate(position)
            };
            popupTitle.setPointerCapture(event.pointerId);
            popupElement.classList.add("dragging");
            event.preventDefault();
            event.stopPropagation();
        }

        function movePopup(event) {
            if (!popupDragState || event.pointerId !== popupDragState.pointerId) {
                return;
            }

            const pixel = [
                popupDragState.startPixel[0] + event.clientX - popupDragState.startClientX,
                popupDragState.startPixel[1] + event.clientY - popupDragState.startClientY
            ];
            popupOverlay.setPosition(map.getCoordinateFromPixel(pixel));
            event.preventDefault();
            event.stopPropagation();
        }

        function stopPopupDrag(event) {
            if (!popupDragState || event.pointerId !== popupDragState.pointerId) {
                return;
            }

            if (popupTitle.hasPointerCapture(event.pointerId)) {
                popupTitle.releasePointerCapture(event.pointerId);
            }
            popupDragState = null;
            popupElement.classList.remove("dragging");
            event.preventDefault();
            event.stopPropagation();
        }

        function startAttributeQueryDrag(event) {
            if (event.button !== 0 || event.target.closest("button")) {
                return;
            }

            const rect = attributeQueryElement.getBoundingClientRect();
            attributeQueryElement.style.transform = "none";
            attributeQueryElement.style.left = `${rect.left}px`;
            attributeQueryElement.style.top = `${rect.top}px`;
            attributeQueryDragState = {
                pointerId: event.pointerId,
                offsetX: event.clientX - rect.left,
                offsetY: event.clientY - rect.top
            };
            attributeQueryHeader.setPointerCapture(event.pointerId);
            attributeQueryElement.classList.add("dragging");
            event.preventDefault();
        }

        function moveAttributeQuery(event) {
            if (!attributeQueryDragState
                || event.pointerId !== attributeQueryDragState.pointerId) {
                return;
            }

            const rect = attributeQueryElement.getBoundingClientRect();
            const maxLeft = Math.max(8, window.innerWidth - rect.width - 8);
            const maxTop = Math.max(8, window.innerHeight - rect.height - 8);
            const left = Math.min(
                Math.max(8, event.clientX - attributeQueryDragState.offsetX),
                maxLeft
            );
            const top = Math.min(
                Math.max(8, event.clientY - attributeQueryDragState.offsetY),
                maxTop
            );
            attributeQueryElement.style.left = `${left}px`;
            attributeQueryElement.style.top = `${top}px`;
            event.preventDefault();
        }

        function stopAttributeQueryDrag(event) {
            if (!attributeQueryDragState
                || event.pointerId !== attributeQueryDragState.pointerId) {
                return;
            }

            if (attributeQueryHeader.hasPointerCapture(event.pointerId)) {
                attributeQueryHeader.releasePointerCapture(event.pointerId);
            }
            attributeQueryDragState = null;
            attributeQueryElement.classList.remove("dragging");
            event.preventDefault();
        }

        let rangeGeoJSON = null;
        let companyGeoJSON = null;

        // 两种高德底图均使用 GCJ-02，业务数据只需统一转换一次
        function readGeoJSONFeatures(data) {
            const sourceData = gcoord.transform(
                structuredClone(data),
                gcoord.WGS84,
                gcoord.GCJ02
            );

            return new ol.format.GeoJSON().readFeatures(sourceData, {
                dataProjection: "EPSG:4326",
                featureProjection: "EPSG:3857"
            });
        }

        async function fetchGeoJSON(url) {
            const response = await fetch(url);
            if (!response.ok) {
                throw new Error(`${url} 加载失败（HTTP ${response.status}）`);
            }
            return response.json();
        }

        // 过滤明显位于浙江省范围外的错误企业坐标，避免全图范围被异常值拉伸
        function filterZhejiangCompanies(data) {
            const features = data.features.filter((feature) => {
                const [longitude, latitude] = feature.geometry.coordinates;
                return longitude >= 118
                    && longitude <= 123
                    && latitude >= 27
                    && latitude <= 32;
            });

            return {
                data: {
                    ...data,
                    features
                },
                excludedCount: data.features.length - features.length
            };
        }

        function refreshBusinessLayers() {
            polygonSource.clear();
            pointSource.clear();
            polygonSource.addFeatures(readGeoJSONFeatures(rangeGeoJSON));
            pointSource.addFeatures(readGeoJSONFeatures(companyGeoJSON));
        }

        // 两种底图坐标一致，切换时仅调整可见性，视图和选择状态保持不变
        function switchBaseMap(baseMap) {
            const labelToggle = document.getElementById("imagery-label-toggle");
            const isImagery = baseMap === "imagery";
            gaodeStandardLayer.setVisible(baseMap === "standard");
            gaodeImageLayer.setVisible(isImagery);
            gaodeLabelLayer.setVisible(isImagery && labelToggle.checked);
            labelToggle.disabled = !isImagery;
        }

        // 将地图缩放至全部开发区和企业数据范围
        function fitToData() {
            const extent = ol.extent.createEmpty();
            ol.extent.extend(extent, polygonSource.getExtent());
            ol.extent.extend(extent, pointSource.getExtent());

            if (!ol.extent.isEmpty(extent)) {
                map.getView().fit(extent, {
                    padding: [70, 70, 70, 320],
                    duration: 700,
                    maxZoom: 12
                });
            }
        }

        // 属性字段名称与数值格式化
        function formatLabel(key) {
            const labels = {
                OBJECTID: "编号",
                Name: "开发区名称",
                block: "区块",
                Range: "范围",
                remark: "备注",
                Shape_Length: "周长",
                Shape_Area: "面积"
            };
            return labels[key] || key;
        }

        function formatValue(key, value) {
            if (value === null || value === undefined || value === "") {
                return "-";
            }
            if (key === "Shape_Area" && Number.isFinite(Number(value))) {
                return `${(Number(value) / 1000000).toFixed(2)} 平方千米`;
            }
            if (key === "Shape_Length" && Number.isFinite(Number(value))) {
                return `${(Number(value) / 1000).toFixed(2)} 千米`;
            }
            return String(value);
        }

        // 构建属性表格、打开弹窗并高亮当前要素
        function showProperties(feature, coordinate) {
            const properties = feature.getProperties();
            const table = document.createElement("table");
            const hiddenFields = new Set(["geometry"]);
            const isPoint = feature.getGeometry().getType() === "Point";

            if (!isPoint) {
                hiddenFields.add("OBJECTID");
                hiddenFields.add("Shape_Length");
            } else {
                hiddenFields.add("中心经度");
                hiddenFields.add("中心纬度");
            }

            Object.entries(properties).forEach(([key, value]) => {
                if (hiddenFields.has(key)) {
                    return;
                }

                const row = document.createElement("tr");
                const heading = document.createElement("th");
                const cell = document.createElement("td");
                heading.textContent = formatLabel(key);
                cell.textContent = formatValue(key, value);
                row.append(heading, cell);
                table.appendChild(row);
            });

            popupTitle.textContent = isPoint
                ? "企业信息"
                : "开发区信息";
            popupContent.replaceChildren(table);
            popupElement.hidden = false;
            popupOverlay.setPosition(coordinate);
            highlightFeature(feature);
        }

        // 新企业数据使用“填报单位详细名称”作为搜索和结果展示名称
        function getCompanyName(feature) {
            const companyName = feature.get("填报单位详细名称");
            if (typeof companyName === "string" && companyName.trim()) {
                return companyName.trim();
            }

            const stringValues = Object.entries(feature.getProperties())
                .filter(([key, value]) => key !== "geometry" && typeof value === "string")
                .map(([, value]) => value.trim())
                .filter(Boolean);
            return stringValues.sort((a, b) => b.length - a.length)[0] || "未命名企业";
        }

        // 企业名称快速搜索
        function renderSearchResults(query) {
            const resultElement = document.getElementById("search-results");
            resultElement.replaceChildren();
            const keyword = query.trim().toLocaleLowerCase();

            if (!keyword) {
                return;
            }

            const matches = pointSource.getFeatures()
                .map((feature) => ({
                    feature,
                    name: getCompanyName(feature)
                }))
                .filter((item) => item.name.toLocaleLowerCase().includes(keyword))
                .slice(0, 20);

            if (!matches.length) {
                const empty = document.createElement("li");
                empty.className = "search-empty";
                empty.textContent = "未找到匹配企业";
                resultElement.appendChild(empty);
                return;
            }

            matches.forEach(({ feature, name }) => {
                const item = document.createElement("li");
                const button = document.createElement("button");
                button.className = "search-result-button";
                button.type = "button";
                button.textContent = name;
                button.addEventListener("click", () => {
                    const coordinate = feature.getGeometry().getCoordinates();
                    map.getView().animate({
                        center: coordinate,
                        zoom: 16,
                        duration: 500
                    });
                    showProperties(feature, coordinate);
                });
                item.appendChild(button);
                resultElement.appendChild(item);
            });
        }

        function getFieldType(fieldName) {
            return companyFieldTypes.get(fieldName) || "text";
        }

        function getOperators(fieldType) {
            return fieldType === "number"
                ? [
                    ["eq", "等于"],
                    ["neq", "不等于"],
                    ["gt", "大于"],
                    ["gte", "大于等于"],
                    ["lt", "小于"],
                    ["lte", "小于等于"],
                    ["empty", "为空"],
                    ["notEmpty", "不为空"]
                ]
                : [
                    ["eq", "等于"],
                    ["neq", "不等于"],
                    ["contains", "包含"],
                    ["starts", "开头是"],
                    ["empty", "为空"],
                    ["notEmpty", "不为空"]
                ];
        }

        function updateClauseOperator(clause) {
            const fieldName = clause.querySelector(".query-field").value;
            const operatorSelect = clause.querySelector(".query-operator");
            const valueInput = clause.querySelector(".query-value");
            const fieldType = getFieldType(fieldName);
            operatorSelect.replaceChildren();

            getOperators(fieldType).forEach(([value, label]) => {
                const option = document.createElement("option");
                option.value = value;
                option.textContent = label;
                operatorSelect.appendChild(option);
            });
            valueInput.type = fieldType === "number" ? "number" : "text";
            valueInput.step = fieldType === "number" ? "any" : "";
            valueInput.value = "";
            valueInput.disabled = false;
        }

        function updateClauseValueState(clause) {
            const operator = clause.querySelector(".query-operator").value;
            const valueInput = clause.querySelector(".query-value");
            valueInput.disabled = operator === "empty" || operator === "notEmpty";
            if (valueInput.disabled) {
                valueInput.value = "";
            }
        }

        function addQueryClause() {
            const container = document.getElementById("query-clauses");
            const clause = document.createElement("div");
            clause.className = "query-clause";

            const fieldSelect = document.createElement("select");
            fieldSelect.className = "query-field";
            companyPropertyFields.forEach((fieldName) => {
                const option = document.createElement("option");
                option.value = fieldName;
                option.textContent = fieldName;
                fieldSelect.appendChild(option);
            });

            const operatorSelect = document.createElement("select");
            operatorSelect.className = "query-operator";
            const valueInput = document.createElement("input");
            valueInput.className = "query-value";
            valueInput.placeholder = "输入值";

            const removeButton = document.createElement("button");
            removeButton.className = "query-remove";
            removeButton.type = "button";
            removeButton.textContent = "×";
            removeButton.title = "删除条件";
            removeButton.addEventListener("click", () => {
                clause.remove();
                if (!container.children.length) {
                    addQueryClause();
                }
            });

            clause.append(fieldSelect, operatorSelect, valueInput, removeButton);
            container.appendChild(clause);
            fieldSelect.addEventListener("change", () => updateClauseOperator(clause));
            operatorSelect.addEventListener("change", () => updateClauseValueState(clause));
            updateClauseOperator(clause);
        }

        function compareAttributeValue(actualValue, operator, expectedValue, fieldType) {
            const isEmpty = actualValue === null
                || actualValue === undefined
                || actualValue === "";
            if (operator === "empty") {
                return isEmpty;
            }
            if (operator === "notEmpty") {
                return !isEmpty;
            }
            if (isEmpty) {
                return false;
            }

            if (fieldType === "number") {
                const actual = Number(actualValue);
                const expected = Number(expectedValue);
                if (!Number.isFinite(actual) || !Number.isFinite(expected)) {
                    return false;
                }
                return {
                    eq: actual === expected,
                    neq: actual !== expected,
                    gt: actual > expected,
                    gte: actual >= expected,
                    lt: actual < expected,
                    lte: actual <= expected
                }[operator] ?? false;
            }

            const actual = String(actualValue).toLocaleLowerCase();
            const expected = String(expectedValue).toLocaleLowerCase();
            return {
                eq: actual === expected,
                neq: actual !== expected,
                contains: actual.includes(expected),
                starts: actual.startsWith(expected)
            }[operator] ?? false;
        }

        function getQueryConditions() {
            return Array.from(document.querySelectorAll(".query-clause")).map((clause) => {
                const fieldName = clause.querySelector(".query-field").value;
                return {
                    fieldName,
                    fieldType: getFieldType(fieldName),
                    operator: clause.querySelector(".query-operator").value,
                    value: clause.querySelector(".query-value").value
                };
            });
        }

        function runAttributeQuery() {
            const conditions = getQueryConditions();
            const matchMode = document.getElementById("query-match-mode").value;
            const missingValue = conditions.some((condition) =>
                condition.operator !== "empty"
                && condition.operator !== "notEmpty"
                && condition.value.trim() === ""
            );

            if (missingValue) {
                document.getElementById("attribute-query-result").textContent =
                    "请为所有查询条件输入比较值。";
                return;
            }

            const matches = pointSource.getFeatures().filter((feature) => {
                const results = conditions.map((condition) => compareAttributeValue(
                    feature.get(condition.fieldName),
                    condition.operator,
                    condition.value,
                    condition.fieldType
                ));
                return matchMode === "all" ? results.every(Boolean) : results.some(Boolean);
            });

            attributeSelectionSource.clear();
            attributeSelectionSource.addFeatures(matches.map((feature) => feature.clone()));
            document.getElementById("attribute-query-result").textContent =
                `已选择 ${matches.length} 家企业，并在地图上以青色圆环高亮。`;
        }

        function zoomToAttributeSelection() {
            const extent = attributeSelectionSource.getExtent();
            if (!ol.extent.isEmpty(extent)) {
                map.getView().fit(extent, {
                    padding: [80, 80, 80, 320],
                    duration: 500,
                    maxZoom: 15
                });
            }
        }

        function clearAttributeSelection() {
            attributeSelectionSource.clear();
            document.getElementById("attribute-query-result").textContent =
                "已清除属性选择。";
        }

        // 开发区名称或区块名称搜索与定位
        function renderDevelopmentZoneResults(query) {
            const resultElement = document.getElementById("development-zone-results");
            resultElement.replaceChildren();
            const keyword = query.trim().toLocaleLowerCase();

            if (!keyword) {
                return;
            }

            const matches = polygonSource.getFeatures()
                .map((feature) => {
                    const name = String(feature.get("Name") || "未命名开发区");
                    const block = String(feature.get("block") || "未命名区块");
                    return {
                        feature,
                        name,
                        block,
                        searchableText: `${name} ${block}`.toLocaleLowerCase()
                    };
                })
                .filter((item) => item.searchableText.includes(keyword))
                .slice(0, 20);

            if (!matches.length) {
                const empty = document.createElement("li");
                empty.className = "search-empty";
                empty.textContent = "未找到匹配开发区";
                resultElement.appendChild(empty);
                return;
            }

            matches.forEach(({ feature, name, block }) => {
                const item = document.createElement("li");
                const button = document.createElement("button");
                button.className = "search-result-button";
                button.type = "button";
                button.textContent = `${name} · ${block}`;
                button.title = `开发区：${name}\n区块：${block}`;
                button.addEventListener("click", () => {
                    const geometry = feature.getGeometry();
                    const coordinate = geometry.getInteriorPoint
                        ? geometry.getInteriorPoint().getCoordinates()
                        : ol.extent.getCenter(geometry.getExtent());

                    polygonLayer.setVisible(true);
                    document.getElementById("polygon-toggle").checked = true;
                    map.getView().fit(geometry.getExtent(), {
                        padding: [80, 80, 80, 320],
                        duration: 500,
                        maxZoom: 15
                    });
                    showProperties(feature, coordinate);
                });
                item.appendChild(button);
                resultElement.appendChild(item);
            });
        }

        // 地图点击：展开聚合点，或展示单个企业/开发区属性
        map.on("singleclick", (event) => {
            closePopup();

            const feature = map.forEachFeatureAtPixel(
                event.pixel,
                (candidate) => candidate,
                {
                    hitTolerance: 5,
                    layerFilter: (layer) =>
                        layer !== selectionLayer && layer !== attributeSelectionLayer
                }
            );

            if (!feature) {
                return;
            }

            const clusteredFeatures = feature.get("features");
            if (clusteredFeatures) {
                if (clusteredFeatures.length > 1) {
                    const extent = ol.extent.createEmpty();
                    clusteredFeatures.forEach((item) => {
                        ol.extent.extend(extent, item.getGeometry().getExtent());
                    });
                    map.getView().fit(extent, {
                        padding: [80, 80, 80, 80],
                        duration: 450,
                        maxZoom: 16
                    });
                    return;
                }
                showProperties(clusteredFeatures[0], event.coordinate);
                return;
            }

            showProperties(feature, event.coordinate);
        });

        // 鼠标经过可点击要素时切换指针样式
        map.on("pointermove", (event) => {
            if (event.dragging) {
                return;
            }
            map.getTargetElement().style.cursor = map.hasFeatureAtPixel(
                event.pixel,
                {
                    hitTolerance: 5,
                    layerFilter: (layer) =>
                        layer !== selectionLayer && layer !== attributeSelectionLayer
                }
            ) ? "pointer" : "";
        });

        // 页面控件与交互事件
        document.getElementById("popup-close").addEventListener("click", closePopup);
        popupTitle.addEventListener("pointerdown", startPopupDrag);
        popupTitle.addEventListener("pointermove", movePopup);
        popupTitle.addEventListener("pointerup", stopPopupDrag);
        popupTitle.addEventListener("pointercancel", stopPopupDrag);
        document.getElementById("polygon-toggle").addEventListener("change", (event) => {
            polygonLayer.setVisible(event.target.checked);
            closePopup();
        });
        document.getElementById("point-toggle").addEventListener("change", (event) => {
            pointLayer.setVisible(event.target.checked);
            closePopup();
        });
        document.getElementById("reset-view").addEventListener("click", () => {
            closePopup();
            fitToData();
        });
        document.getElementById("company-search").addEventListener("input", (event) => {
            renderSearchResults(event.target.value);
        });
        document.getElementById("open-attribute-query").addEventListener("click", () => {
            attributeQueryElement.hidden = false;
            if (!document.getElementById("query-clauses").children.length) {
                addQueryClause();
            }
        });
        document.getElementById("close-attribute-query").addEventListener("click", () => {
            attributeQueryElement.hidden = true;
        });
        attributeQueryHeader.addEventListener("pointerdown", startAttributeQueryDrag);
        attributeQueryHeader.addEventListener("pointermove", moveAttributeQuery);
        attributeQueryHeader.addEventListener("pointerup", stopAttributeQueryDrag);
        attributeQueryHeader.addEventListener("pointercancel", stopAttributeQueryDrag);
        document.getElementById("add-query-clause").addEventListener("click", addQueryClause);
        document.getElementById("run-attribute-query").addEventListener(
            "click",
            runAttributeQuery
        );
        document.getElementById("zoom-query-result").addEventListener(
            "click",
            zoomToAttributeSelection
        );
        document.getElementById("clear-attribute-query").addEventListener(
            "click",
            clearAttributeSelection
        );
        document.getElementById("development-zone-search").addEventListener("input", (event) => {
            renderDevelopmentZoneResults(event.target.value);
        });
        document.querySelectorAll('input[name="base-map"]').forEach((input) => {
            input.addEventListener("change", (event) => {
                if (event.target.checked) {
                    switchBaseMap(event.target.value);
                }
            });
        });
        document.getElementById("imagery-label-toggle").addEventListener("change", (event) => {
            const imagerySelected = document.querySelector(
                'input[name="base-map"][value="imagery"]'
            ).checked;
            gaodeLabelLayer.setVisible(imagerySelected && event.target.checked);
        });
        panelToggle.addEventListener("click", () => {
            const expanded = mapPanel.classList.toggle("expanded");
            panelToggle.textContent = expanded ? "收起" : "展开";
            panelToggle.setAttribute("aria-expanded", String(expanded));
        });

        // 并行加载开发区与企业数据，完成后统计数量并适配全图
        Promise.all([
            fetchGeoJSON("./data/Range.geojson"),
            fetchGeoJSON("./data/ZJHJTJ.geojson")
        ]).then(([rangeData, companyData]) => {
            const filteredCompanies = filterZhejiangCompanies(companyData);
            rangeGeoJSON = rangeData;
            companyGeoJSON = filteredCompanies.data;
            companyPropertyFields = Object.keys(companyGeoJSON.features[0].properties)
                .filter((fieldName) => fieldName !== "中心经度" && fieldName !== "中心纬度");
            companyPropertyFields.forEach((fieldName) => {
                const sampleFeature = companyGeoJSON.features.find((feature) =>
                    feature.properties[fieldName] !== null
                    && feature.properties[fieldName] !== undefined
                );
                const sampleValue = sampleFeature
                    ? sampleFeature.properties[fieldName]
                    : "";
                companyFieldTypes.set(
                    fieldName,
                    typeof sampleValue === "number" ? "number" : "text"
                );
            });
            document.getElementById("open-attribute-query").disabled = false;
            refreshBusinessLayers();

            const polygonCount = rangeData.features.length;
            const pointCount = filteredCompanies.data.features.length;
            document.getElementById("polygon-count").textContent = polygonCount;
            document.getElementById("point-count").textContent = pointCount;
            fitToData();
            const excludedMessage = filteredCompanies.excludedCount
                ? `，忽略 ${filteredCompanies.excludedCount} 条异常坐标`
                : "";
            updateStatus(
                `已加载 ${polygonCount} 个开发区范围、${pointCount} 家工业企业`
                    + excludedMessage
            );
            window.setTimeout(hideStatus, 2600);
        }).catch((error) => {
            console.error(error);
            updateStatus(`数据加载失败：${error.message}`, true);
        });
    </script>
</body>
</html>
