<!DOCTYPE html>
<html>
<head>

<link
rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/ol@v7.3.0/ol.css">

<script
    src="https://cdn.jsdelivr.net/npm/ol@v7.3.0/dist/ol.js">
</script>

<script 
    src="https://unpkg.com/gcoord/dist/gcoord.global.prod.js">
</script>

<style>
    html,body,#map{
        height:100vh;
        margin:0;
    }

    /* 弹窗样式 */
    .popup {
        position: absolute;
        background: white;
        padding: 10px;
        border: 1px solid #999;
        border-radius: 4px;
        min-width: 220px;
        max-width: 360px;
        font-size: 13px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        display: none;
        z-index: 999;
    }

    .popup table {
        border-collapse: collapse;
        width: 100%;
    }

    .popup td {
        border: 1px solid #ddd;
        padding: 4px 6px;
    }
</style>

</head>
<body>

<div id="map"></div>
<div id="popup" class="popup"></div>
<script>

    // 高德影像底图
    const gaodeImageLayer = new ol.layer.Tile({
        source: new ol.source.XYZ({
            url: 'https://webst0{1-4}.is.autonavi.com/appmaptile?style=6&x={x}&y={y}&z={z}'
        })
    });

    // 高德影像标注底图
    const gaodeImageLabelLayer = new ol.layer.Tile({
        source: new ol.source.XYZ({
            url: 'https://webst0{1-4}.is.autonavi.com/appmaptile?style=8&x={x}&y={y}&z={z}'
        })
    });

    // 面图层
    const polygonLayer = new ol.layer.Vector({
        source:new ol.source.Vector(),

        style:new ol.style.Style({
            stroke:new ol.style.Stroke({
                color:'blue',width:2
            }),
            fill:new ol.style.Fill({
                color:'rgba(0,0,255,0.15)'
            })
        })
    });

    // 点图层
    const pointLayer = new ol.layer.Vector({
        source:new ol.source.Vector(),
    
        style:new ol.style.Style({
            image:new ol.style.Circle({
                radius:5,
                fill:new ol.style.Fill({
                    color:'red'
                })
            })
        })
    });


    // 创建地图
    const map =new ol.Map({
        target:'map',
        layers:[gaodeImageLayer, gaodeImageLabelLayer, polygonLayer, pointLayer],
        view:new ol.View({
            center:ol.proj.fromLonLat([120.15,30.28]),
            zoom:10
        })
    });

    // 加载面
    fetch('./data/Range.geojson').then(
        res=>res.json()
    ).then(data=>{
        const converted=gcoord.transform(
            data,
            gcoord.WGS84,
            gcoord.GCJ02
        )

        const features=new ol.format.GeoJSON().readFeatures(
            converted,{
            dataProjection:'EPSG:4326',
            featureProjection:'EPSG:3857'
        })

        polygonLayer.getSource().addFeatures(features)
    })

    //  加载点
    fetch('./data/company.geojson').then(
        res=>res.json()
    ).then(data=>{
        const converted=gcoord.transform(
            data,
            gcoord.WGS84,
            gcoord.GCJ02
        )

        const features=new ol.format.GeoJSON().readFeatures(
            converted,{
            dataProjection:'EPSG:4326',
            featureProjection:'EPSG:3857'
        })

        pointLayer.getSource().addFeatures(features)
    })

    // 点击事件
    const popup = document.getElementById('popup');

    map.on('singleclick', function (event) {
        const feature = map.forEachFeatureAtPixel(
            event.pixel,
            function (feature) {
                return feature;
            }
        );

        if (!feature) {
            popup.style.display = 'none';
            return;
        }

        const properties = feature.getProperties();

        delete properties.geometry;

        let html = '<strong>属性信息</strong>';
        html += '<table>';

        for (const key in properties) {
            html += `
                <tr>
                    <td>${key}</td>
                    <td>${properties[key]}</td>
                </tr>
            `;
        }

        html += '</table>';

        popup.innerHTML = html;
        popup.style.left = event.pixel[0] + 15 + 'px';
        popup.style.top = event.pixel[1] + 15 + 'px';
        popup.style.display = 'block';
    });
   
</script>
</body>
</html>
